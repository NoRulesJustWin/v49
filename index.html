<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>𝐃𝐫.𝐒𝐢𝐦𝐨𝐧 𝐋𝐞𝐯𝐢𝐞𝐯 | Group</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.1) 3px, rgba(0,0,0,0.1) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  .page {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: opacity 1s, transform 1s;
  }
  .page.hidden { opacity: 0; pointer-events: none; transform: scale(1.04); }

  /* ── PAGE 1 ── */
  canvas#matrix { position: fixed; inset: 0; z-index: 0; }

  .content1 {
    position: relative; z-index: 10;
    text-align: center; padding: 2rem;
    max-width: 900px; width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .tag-line {
    font-size: 0.75rem; color: rgba(255,255,255,0.35);
    letter-spacing: 0.4em; margin-bottom: 1rem;
    animation: blink 1.2s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .group-name {
    font-family: 'Orbitron', monospace;
    font-size: clamp(2.5rem, 8vw, 6rem);
    font-weight: 900; color: #fff;
    text-shadow: 0 0 15px #fff, 0 0 40px rgba(255,255,255,0.2);
    letter-spacing: 0.05em; 
    text-align: center;
    margin: 0 auto 1.2rem auto;
    animation: flicker 5s infinite; line-height: 1;
    display: block;
    width: 100%;
    white-space: nowrap;

  }
  @keyframes flicker {
    0%,19%,21%,23%,25%,54%,56%,100% { opacity: 1; }
    20%,24%,55% { opacity: 0.3; }
  }

  .divider {
    margin: 1.2rem auto; height: 1px; width: 60%;
    background: linear-gradient(90deg, transparent, #fff, transparent);
    box-shadow: 0 0 10px #fff;
  }

  .desc-box {
    background: rgba(0, 0, 0, 0.75);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 4px; padding: 1.2rem 2rem;
    margin: 1rem auto; max-width: 650px;
    text-align: left; font-size: 0.85rem;
    line-height: 1.9; direction: ltr;
    width: 100%;
  }
  .desc-box .prompt { color: #fff; }
  .desc-box .cmd   { color: #bbb; }
  .desc-box .out   { color: #666; }
  .typed { border-right: 2px solid #fff; animation: cur 0.8s step-end infinite; }
  @keyframes cur { 50% { border-color: transparent; } }

  .members-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem; letter-spacing: 0.35em;
    color: rgba(255,255,255,0.3); margin: 1.4rem 0 0.7rem;
  }

  .members-grid {
    display: flex; flex-wrap: wrap;
    justify-content: center; gap: 0.5rem;
    max-width: 680px; margin: 0 auto;
  }

  .member-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 3px; padding: 0.35rem 0.9rem;
    font-size: 0.8rem; color: #aaa; transition: all 0.25s;
  }
  .member-card::before { content: '> '; color: #444; }
  .member-card:hover {
    background: rgba(255,255,255,0.1);
    border-color: #fff; color: #fff;
    text-shadow: 0 0 8px #fff;
  }
  .member-card.leader { border-color: rgba(255,255,255,0.2); color: #fff; }

  .bar-wrap {
    margin: 1.8rem auto 0;
    width: 220px; height: 2px;
    background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden;
  }
  .bar-fill {
    height: 100%; width: 100%; background: #fff;
    box-shadow: 0 0 8px #fff;
    animation: shrink 3s linear forwards;
    transform-origin: left;
  }
  @keyframes shrink { from { transform: scaleX(1); } to { transform: scaleX(0); } }
  .bar-label {
    margin-top: 0.5rem; font-size: 0.6rem;
    letter-spacing: 0.35em; color: rgba(255,255,255,0.25); text-align: center;
  }

  /* ── PAGE 2 ── */
  #page2 { background: #000; }

  .video-wrap { position: fixed; inset: 0; z-index: 1; }
  .video-wrap video {
    width: 100%; height: 100%;
    object-fit: cover;
    filter: grayscale(100%) contrast(1.1);
    opacity: 0.55;
  }
  .video-wrap::after {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.85) 100%);
  }

  .overlay2 {
    position: relative; z-index: 10;
    text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 1.2rem;
  }

  .passed-text {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.4rem, 5vw, 3.2rem);
    font-weight: 900; color: #fff; letter-spacing: 0.12em;
    text-shadow: 0 0 25px #fff, 0 0 60px rgba(255,255,255,0.2);
    animation: fadeUp 1.2s ease forwards; opacity: 0;
  }

  .discord-link {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(0.9rem, 2.5vw, 1.2rem);
    color: #888; letter-spacing: 0.25em;
    animation: fadeUp 1.2s 0.6s ease forwards; opacity: 0;
    text-decoration: none;
    border-bottom: 1px solid rgba(255,255,255,0.15);
    padding-bottom: 2px; transition: all 0.2s;
  }
  .discord-link:hover { color: #fff; border-color: #fff; text-shadow: 0 0 10px #fff; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .corner { position: fixed; width: 50px; height: 50px; border-color: rgba(255,255,255,0.3); border-style: solid; z-index: 12; }
  .corner.tl { top:16px; left:16px;   border-width: 2px 0 0 2px; }
  .corner.tr { top:16px; right:16px;  border-width: 2px 2px 0 0; }
  .corner.bl { bottom:16px; left:16px;  border-width: 0 0 2px 2px; }
  .corner.br { bottom:16px; right:16px; border-width: 0 2px 2px 0; }
</style>
</head>
<body>

<!-- PAGE 1 -->
<div id="page1" class="page">
  <canvas id="matrix"></canvas>
  <div class="content1">
    <div class="tag-line">[ INITIALIZING SYSTEM... ]</div>
    <div class="group-name">𝐃𝐫.𝐒𝐢𝐦𝐨𝐧 𝐋𝐞𝐯𝐢𝐞𝐯</div>
    <div class="divider"></div>
    <div class="desc-box">
      <div><span class="prompt">root@dw:~$</span> <span class="cmd"> cat group_info.txt</span></div><br>
      <div class="out">// Group  : <span style="color:#ddd">𝐃𝐫.𝐒𝐢𝐦𝐨𝐧 𝐋𝐞𝐯𝐢𝐞𝐯</span></div>
      <div class="out">// Type   : <span style="color:#ddd">Programming &amp; Development</span></div>
      <div class="out">// Status : <span style="color:#fff">● ALIVE</span></div><br>

      <div><span class="prompt">System@𝐃𝐫.𝐒𝐢𝐦𝐨𝐧 𝐋𝐞𝐯𝐢𝐞𝐯~$</span> <span class="cmd typed">_</span></div>
    </div>

    <div class="members-title">// ACTIVE MEMBERS //</div>
    <div class="members-grid" id="membersGrid"></div>

    <div class="bar-wrap"><div class="bar-fill"></div></div>
    <div class="bar-label">ENTERING IN 3s...</div>
  </div>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page hidden">
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>

  <div class="video-wrap">
    <video id="bgVideo" autoplay loop muted playsinline>
      <source src="https://c.top4top.io/m_3840d5lmq1.mp4" type="video/mp4">
    </video>
  </div>

  <audio id="bgAudio" autoplay loop>
    <source src="https://f.top4top.io/m_3840wdb6q1.mp3" type="audio/mpeg">
  </audio>

  <div class="overlay2">
    <div class="passed-text">Passed By 𝐃𝐫.𝐒𝐢𝐦𝐨𝐧 𝐋𝐞𝐯𝐢𝐞𝐯</div>
    <a class="discord-link" href="https://discord.gg/049" target="_blank">discord.gg/049</a>
  </div>
</div>

<script>
// Matrix B&W
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);
const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*<>/\\|_+-=[]{}';
const fs = 14; let cols, drops;
function init() { cols = Math.floor(canvas.width / fs); drops = Array(cols).fill(1); }
init(); window.addEventListener('resize', init);
function draw() {
  ctx.fillStyle = 'rgba(0,0,0,0.06)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.font = fs + 'px "Share Tech Mono"';
  drops.forEach((y, i) => {
    const ch = chars[Math.floor(Math.random() * chars.length)];
    const r = Math.random();
    ctx.globalAlpha = r * 0.55 + 0.05;
    ctx.fillStyle = r > 0.95 ? '#fff' : r > 0.5 ? '#999' : '#333';
    ctx.fillText(ch, i * fs, y * fs);
    if (y * fs > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  });
  ctx.globalAlpha = 1;
}
setInterval(draw, 45);

// Members
const members = ['8bx','ABO MT3B','HZX67'];
const grid = document.getElementById('membersGrid');
const lc = document.createElement('div');
lc.className = 'member-card leader'; lc.textContent = 'group member';
grid.appendChild(lc);
members.forEach(m => {
  const c = document.createElement('div');
  c.className = 'member-card'; c.textContent = m;
  grid.appendChild(c);
});

// Function to play video and audio safely
function playMedia() {
  const vid = document.getElementById('bgVideo');
  const aud = document.getElementById('bgAudio');
  
  if (vid) {
    vid.muted = true;
    vid.play().catch(() => {
      // Ignore initial block, will try again on transition or click
    });
  }
  
  if (aud) {
    aud.volume = 0.8;
    aud.play().catch(() => {
      // Play on first user click if blocked by browser policy
      document.addEventListener('click', () => {
        if (aud) aud.play().catch(() => {});
        if (vid) vid.play().catch(() => {});
      }, { once: true });
    });
  }
}

// Start playing on DOMContentLoaded
window.addEventListener('DOMContentLoaded', playMedia);

// Auto transition 3s
setTimeout(() => {
  document.getElementById('page1').classList.add('hidden');
  const p2 = document.getElementById('page2');
  p2.classList.remove('hidden');
  
  // Re-trigger play once transition happens to ensure playback starts
  playMedia();
}, 3000);
</script>
</body>
</html>
